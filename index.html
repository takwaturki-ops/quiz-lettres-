<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Multi-Matières</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="confetti" class="hidden"></canvas>

  <div class="app">
    <!-- Home / Subject Selection -->
    <section id="subject-screen" class="screen">
      <div class="header">
        <h1>🎓 Quiz Multi-Matières</h1>
        <p>Choisis un sujet et teste tes connaissances</p>
      </div>
      <div id="subject-grid" class="subject-grid"></div>
    </section>

    <!-- Quiz Screen -->
    <section id="quiz-screen" class="screen hidden">
      <div class="quiz-header">
        <button id="back-btn" class="icon-btn" aria-label="Retour">←</button>
        <h2 id="subject-title">Sujet</h2>
        <div class="score-badge">
          Score : <span id="score-value">0</span>
        </div>
      </div>
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="card">
        <div id="question-number">Question 1 / 10</div>
        <div id="question-text" class="question-text"></div>
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback"></div>
        <button id="next-btn" class="next-btn hidden">Question suivante →</button>
      </div>
    </section>

    <!-- Result Screen -->
    <section id="result-screen" class="screen hidden">
      <div class="card result-card">
        <h2>🏆 Quiz terminé !</h2>
        <p class="result-score">Score : <span id="final-score">0 / 0</span></p>
        <p id="final-message" class="result-message"></p>
        <div class="result-actions">
          <button id="restart-btn" class="primary-btn">Rejouer</button>
          <button id="home-btn" class="secondary-btn">Changer de sujet</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
